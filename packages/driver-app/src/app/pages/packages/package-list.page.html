<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Packages</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div *ngIf="isLoading" class="loading-state">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p>Loading packages...</p>
  </div>

  <div *ngIf="!isLoading && packages.length === 0" class="empty-state">
    <ion-icon name="cube-outline" class="empty-icon"></ion-icon>
    <h3>No Packages</h3>
    <p>No packages assigned for today.</p>
  </div>

  <div *ngIf="!isLoading && packages.length > 0" class="package-list">
    <div class="package-card" *ngFor="let pkg of packages" [routerLink]="['/tabs/packages', pkg.id]">
      <div class="package-header">
        <span class="tracking-number">{{ pkg.trackingNumber }}</span>
        <ion-badge [color]="getStatusColor(pkg.status)">{{ pkg.status }}</ion-badge>
      </div>
      <div class="package-destination">
        <ion-icon name="location-outline"></ion-icon>
        <span>{{ pkg.destinationAddress }}</span>
      </div>
    </div>
  </div>
</ion-content>
